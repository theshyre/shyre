name: CI

# Hard gate for code changes. Runs lint (--max-warnings=0), typecheck, and
# unit tests on every push to main and every pull request. If this workflow
# is red, the change must not land — no exceptions for "warnings" or
# "flaky tests". Integration + E2E tests run separately (they need secrets
# and longer timeouts) and are not included here.

on:
  push:
    branches: [main]
  pull_request: {}

# Grants the built-in GITHUB_TOKEN read access to packages in the
# theshyre org — needed to install @theshyre/* from GitHub Packages.
permissions:
  contents: read
  packages: read

concurrency:
  # Cancel in-progress CI for the same ref so rapid pushes don't queue up.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          # Writes a .npmrc auth line reading ${NODE_AUTH_TOKEN} so npm
          # can pull @theshyre/* from the org's private GH Packages.
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        env:
          # Auto GITHUB_TOKEN carries packages: read (granted in the
          # workflow permissions block above) — no PAT required.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Lint (zero warnings allowed)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
