name: Apply Supabase migrations

# Auto-apply migrations in supabase/migrations/** to the linked production
# Supabase project. The repo secret `SUPABASE_DB_URL` must hold the session-
# pooler connection string (port 5432, not 6543 — the transaction pooler
# can't run migrations).
#
# Race caveat: Vercel auto-deploys app code on the same push. If a migration
# drops or renames a column the app still reads, the window between Vercel
# finishing its build and this job finishing its migration is a brief
# outage. Mitigations:
#   - Prefer additive migrations (ADD COLUMN, CREATE INDEX, CREATE TABLE).
#   - For destructive migrations: ship the code change that stops reading
#     the column in one PR, wait for Vercel to deploy, then ship the
#     migration in a follow-up PR.
#   - If the race matters for a given migration, disable Vercel's auto-
#     deploy on that push, apply the migration, then redeploy manually.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch: {}

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  apply:
    name: supabase db push (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        # `pipefail` is the important bit: without it, piping the CLI into
        # sed masked `db push` failures as success (the sed filter exited 0
        # even when the migration errored). Two migrations silently
        # rolled back on prod while CI stayed green. Never again.
        shell: bash
        run: |
          set -eo pipefail
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set on this repo. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          # Force session-pooler port (5432). Transaction pooler (6543) can't
          # run migrations — matches what scripts/db-push.sh does locally.
          SESSION_URL=$(echo "$SUPABASE_DB_URL" | sed 's|:6543/|:5432/|')
          # Redact password on any leaked CLI output.
          supabase db push --db-url "$SESSION_URL" 2>&1 \
            | sed -E 's|(postgresql://[^:]+):[^@]+@|\1:REDACTED@|g'
